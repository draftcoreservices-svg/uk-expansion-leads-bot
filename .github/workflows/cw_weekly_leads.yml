name: CW Weekly Sponsor Leads (Structured)

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache cw_cache.sqlite
        uses: actions/cache@v4
        with:
          path: data/cw_cache.sqlite
          key: cw-cache-v2-${{ github.run_id }}
          restore-keys: cw-cache-v2-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Weekly Bot
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          CW_CACHE_PATH: data/cw_cache.sqlite
          MAX_LEADS: "50"
          TARGET_QUALIFIED_POOL: "120"
          MAX_EVAL_CANDIDATES: "600"
          MAX_SEEDED_CANDIDATES: "2000"
        run: |
          python -u -m src.run_weekly
